<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>GoTix</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav>
    <div class="nav-brand">🎟 GoTix</div>
    <div class="nav-links">
        <button onclick="showTab('events')">Events</button>
        <button onclick="showTab('reservations')">My Tickets</button>
        <button onclick="showTab('register')">Register</button>
    </div>
</nav>

<main>

    <!-- ── Events tab ─────────────────────────────────── -->
    <section id="tab-events">
        <h2>Upcoming Events</h2>
        <div class="search-bar">
            <input type="date"   id="search-date"     placeholder="Date">
            <input type="text"   id="search-location" placeholder="City or venue">
            <select id="search-category">
                <option value="">All categories</option>
                <option value="Movie">Movie</option>
                <option value="Concert">Concert</option>
                <option value="Sports">Sports</option>
                <option value="Travel">Travel</option>
            </select>
            <button onclick="searchEvents()">Search</button>
            <button onclick="loadEvents()" class="btn-secondary">Reset</button>
        </div>
        <div id="events-list" class="card-grid"></div>
    </section>

    <!-- ── Book modal ─────────────────────────────────── -->
    <div id="book-modal" class="modal-overlay" style="display:none">
        <div class="modal-card">
            <h3 id="modal-title">Reserve tickets</h3>
            <p id="modal-seats" class="muted"></p>
            <div class="form-group">
                <label>User ID (or name)</label>
                <input id="book-user" type="text" placeholder="e.g. user123">
            </div>
            <div class="form-group">
                <label>Number of tickets</label>
                <input id="book-qty" type="number" min="1" value="1">
            </div>
            <div id="book-msg" class="message"></div>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn-primary" onclick="confirmBook()">Confirm booking</button>
            </div>
        </div>
    </div>

    <!-- ── My Reservations tab ────────────────────────── -->
    <section id="tab-reservations" style="display:none">
        <h2>My Tickets</h2>
        <div class="search-bar">
            <input id="res-user-id" type="text" placeholder="Enter your User ID">
            <button onclick="loadReservations()">Load tickets</button>
        </div>
        <div id="res-msg" class="message"></div>
        <div id="reservations-list" class="card-grid"></div>
    </section>

    <!-- ── Register tab ───────────────────────────────── -->
    <section id="tab-register" style="display:none">
        <div class="register-card">
            <h2>Create account</h2>
            <p class="muted">Register with your email or phone number.</p>
            <div class="form-group">
                <label>Email address</label>
                <input id="reg-email" type="email" placeholder="you@example.com">
            </div>
            <p class="muted" style="text-align:center;margin:0">— or —</p>
            <div class="form-group">
                <label>Phone number</label>
                <input id="reg-phone" type="tel" placeholder="+1 514 123 4567">
            </div>
            <button class="btn-primary" onclick="register()">Create account</button>
            <div id="reg-msg" class="message"></div>
        </div>
    </section>

</main>

<script src="app.js"></script>
</body>
</html>
