# GoTix Application Configuration
spring.application.name=go-tix

# Database Configuration (PostgreSQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ticketdb}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USER:ticketuser}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:ticketpass}}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}

# HikariCP Connection Pool (Non-Functional Requirement: concurrent users without degradation)
# Pool sized to handle bursts of concurrent booking requests efficiently
spring.datasource.hikari.pool-name=GoTixPool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=60000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=gotix-secret-key-must-be-at-least-32-characters
jwt.expiration=86400000

# Server
server.port=${PORT:8080}

# Mail (MailHog for local testing — runs on localhost:1025)
# For production, use real Gmail or SendGrid credentials
spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Twilio SMS (configure for production)
# Sign up at https://www.twilio.com — get a free trial number
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.from-number=${TWILIO_FROM_NUMBER:}

# JWT
jwt.secret=${JWT_SECRET:gotix-secret-key-change-in-production-must-be-32-chars}
jwt.expiration=86400000

# Logging
logging.level.com.ticketreservation=INFO
logging.level.org.springframework.security=WARN
