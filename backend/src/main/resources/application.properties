# GoTix Application Configuration
spring.application.name=go-tix

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5432/ticketdb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=ticketuser
spring.datasource.password=ticketpass
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=gotix-secret-key-must-be-at-least-32-characters
jwt.expiration=86400000

# Server
server.port=8080

# Mail (configure for production)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:noreply@gotix.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT
jwt.secret=${JWT_SECRET:gotix-secret-key-change-in-production-must-be-32-chars}
jwt.expiration=86400000

# Logging
logging.level.com.ticketreservation=INFO
logging.level.org.springframework.security=WARN
